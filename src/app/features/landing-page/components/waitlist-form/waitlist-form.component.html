<div class="waitlist-container max-w-lg mx-auto bg-gray-800 p-8 rounded-xl shadow-lg border border-gray-700 backdrop-blur-md bg-opacity-70">
  <h3 class="text-2xl font-bold text-white mb-4 text-center font-montserrat">Não perca a primeira fila.</h3>
  <p class="text-gray-300 text-center mb-6">Junte-se a mais de 2.000 músicos que já aguardam o lançamento da Sonic Stage. Receba novidades exclusivas e convites para o Beta.</p>
  
  <form (ngSubmit)="onSubmit()" class="flex flex-col sm:flex-row gap-3">
    <input 
      type="email" 
      [ngModel]="email()" 
      (ngModelChange)="email.set($event)"
      name="email"
      placeholder="Seu melhor e-mail" 
      class="flex-1 px-4 py-3 bg-gray-900 border border-gray-600 rounded-md focus:outline-none focus:border-blue-500 text-white placeholder-gray-400"
      [disabled]="isSubmitting()"
      required>
      
    <button 
      type="submit" 
      class="px-6 py-3 bg-[#00d1ff] hover:bg-blue-400 text-gray-900 font-bold rounded-md transition-colors flex justify-center items-center"
      [disabled]="isSubmitting()">
      <span *ngIf="isSubmitting()">Enviando...</span>
      <span *ngIf="!isSubmitting()">Quero ser avisado</span>
    </button>
  </form>

  <div *ngIf="errorMessage()" class="mt-4 p-3 bg-red-900 bg-opacity-50 border border-red-500 rounded text-red-200 text-sm text-center">
    {{ errorMessage() }}
  </div>

  <div *ngIf="successMessage()" class="mt-4 p-3 bg-green-900 bg-opacity-50 border border-green-500 rounded text-green-200 text-sm text-center">
    {{ successMessage() }}
  </div>
  
  <p class="text-xs text-gray-500 text-center mt-4">Respeitamos sua privacidade. Nada de spam, apenas rock n' roll.</p>
</div>
