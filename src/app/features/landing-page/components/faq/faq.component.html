<section id="faq" class="py-24 bg-gray-900">
  <div class="container mx-auto px-4 max-w-3xl">
    <div class="text-center mb-16">
      <h2 class="text-3xl md:text-4xl font-bold text-white mb-4 font-montserrat">Dúvidas Frequentes</h2>
    </div>

    <div class="space-y-4">
      @for (item of faqs(); track item.question; let i = $index) {
      <div class="border border-gray-800 bg-gray-950 rounded-xl overflow-hidden transition-colors hover:border-gray-700">
        <button 
          (click)="toggleFaq(i)"
          class="w-full px-6 py-5 flex items-center justify-between focus:outline-none text-left">
          <span class="text-lg font-bold text-gray-200">{{ item.question }}</span>
          <span class="text-gray-400 transition-transform duration-300" [class.rotate-180]="item.isOpen">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </span>
        </button>
        
        <div 
          class="px-6 overflow-hidden transition-all duration-300 ease-in-out"
          [class.max-h-0]="!item.isOpen"
          [class.max-h-40]="item.isOpen"
          [class.opacity-0]="!item.isOpen"
          [class.opacity-100]="item.isOpen">
          <p class="text-gray-400 pb-5 pt-1">{{ item.answer }}</p>
        </div>
      </div>
      }
    </div>
  </div>
</section>
