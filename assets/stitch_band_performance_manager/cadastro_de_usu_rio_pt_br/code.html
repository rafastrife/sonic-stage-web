<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sonic Stage - Cadastro</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>

          theme: {
            extend: {
              "colors": {
                      "on-primary-fixed-variant": "#004e60",
                      "outline-variant": "#3c494e",
                      "surface-container-lowest": "#0e0e0e",
                      "on-background": "#e5e2e1",
                      "surface-dim": "#131313",
                      "on-secondary-container": "#590026",
                      "on-secondary-fixed-variant": "#8f0041",
                      "surface-container-high": "#2a2a2a",
                      "error": "#ffb4ab",

                      "surface-container": "#201f1f",
                      "on-secondary-fixed": "#3f0019",
                      "surface-variant": "#353534",
                      "tertiary": "#ffd59c",
                      "surface": "#131313",
                      "on-tertiary-container": "#6b4700",
                      "primary-fixed": "#b7eaff",
                      "outline": "#859399",
                      "secondary-container": "#ff4b89",
                      "background": "#131313",
                      "primary-fixed-dim": "#4cd6ff",
                      "error-container": "#93000a",
                      "surface-tint": "#4cd6ff",
                      "primary": "#a4e6ff",
                      "inverse-primary": "#00677f",
                      "tertiary-fixed-dim": "#ffba49",
                      "on-primary-container": "#00566a",
                      "on-tertiary-fixed-variant": "#624000",
                      "secondary-fixed-dim": "#ffb1c3",
                      "tertiary-container": "#feb127",
                      "tertiary-fixed": "#ffddb1",
                      "primary-container": "#00d1ff",
                      "on-tertiary-fixed": "#291800",
                      "on-primary": "#003543",
                      "surface-container-highest": "#353534",
                      "on-tertiary": "#442b00",
                      "inverse-on-surface": "#313030",
                      "on-error-container": "#ffdad6",
                      "on-surface": "#e5e2e1",
                      "secondary": "#ffb1c3",
                      "inverse-surface": "#e5e2e1",
                      "on-secondary": "#66002c",
                      "surface-bright": "#3a3939",
                      "on-surface-variant": "#bbc9cf",
                      "surface-container-low": "#1c1b1b",
                      "on-primary-fixed": "#001f28",
                      "secondary-fixed": "#ffd9e0"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "spacing": {
                      "base": "8px",
                      "max-width": "1440px",
                      "margin-mobile": "16px",
                      "gutter": "24px",
                      "margin-desktop": "48px"
              },
              "fontFamily": {
                      "headline-lg-mobile": ["Montserrat"],
                      "label-sm": ["Montserrat"],
                      "headline-lg": ["Montserrat"],
                      "label-lg": ["Montserrat"],

                      "body-lg": ["Montserrat"],

              "fontSize": {

                      "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }]
              }
            }
          }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Custom Audio Visualizer Animation */
        @keyframes bounce {
            0%, 100% { transform: scaleY(0.2); }
            50% { transform: scaleY(1); }
        }
        .bar {
            transform-origin: bottom;
            animation: bounce 1.5s infinite ease-in-out;
            background: linear-gradient(to top, theme('colors.primary'), theme('colors.secondary-container'));
        }
        .bar:nth-child(1) { animation-delay: 0.1s; height: 40px; }
        .bar:nth-child(2) { animation-delay: 0.3s; height: 80px; }
        .bar:nth-child(3) { animation-delay: 0.0s; height: 60px; }
        .bar:nth-child(4) { animation-delay: 0.4s; height: 100px; }
        .bar:nth-child(5) { animation-delay: 0.2s; height: 50px; }
        .bar:nth-child(6) { animation-delay: 0.5s; height: 70px; }
        .bar:nth-child(7) { animation-delay: 0.1s; height: 90px; }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex selection:bg-primary-container selection:text-on-primary-container">
<!-- Left Brand Sidebar -->
<div class="hidden lg:flex w-1/2 bg-surface-dim relative overflow-hidden flex-col justify-between p-margin-desktop border-r border-surface-variant">
<!-- Background Image overlay -->
<div class="absolute inset-0 z-0 opacity-40 mix-blend-luminosity bg-cover bg-center" data-alt="A neon-futuristic live music stage viewed from the audience perspective. The scene is bathed in deep blacks and high-contrast electric blue and vivid magenta lighting, reflecting a premium, high-energy digital performance aesthetic. Silhouettes of a band are visible against massive glowing LED screens. The mood is immersive, atmospheric, and technologically advanced, perfectly aligning with a modern dark-mode UI style." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBuQi5E5hWqU6dGsKKPvm7KcbX-ZppfbfPdfVkWAl44yPAROPxHwcvI24r1Kn4AYJpf4fjnjOLFgS-1v4YkvOQO0G_nKfeKu2pBgNcCe_UYar_yRB53gQd8NKhEJha-L8WCieWECimrG7ABuGaS9nO6VUDmOytXBdL7qVJm9a-5IrAFsY-Q6mWHjUNOJLIWpdhjAKXn_Rr78x4xNkgU75lSGSJZ2EswOoUZgh06yydFhUrqTOVc9tzqUvH0wpkmGirOC7XwgbyeTIA');">
</div>
<div class="absolute inset-0 z-0 bg-gradient-to-b from-background/80 via-background/60 to-background/95"></div>
<!-- Top Content -->
<div class="relative z-10">
<div class="flex items-center gap-3 mb-4">
<span class="material-symbols-outlined icon-fill text-primary text-4xl">graphic_eq</span>
<h1 class="text-display-lg font-display-lg text-primary tracking-tighter">Sonic Stage</h1>
</div>
<p class="text-headline-md font-headline-md text-on-surface-variant max-w-md">
                Entre no mundo de alta energia da performance digital. Crie, transmita e conecte-se com pura fidelidade.
            </p>
</div>
<!-- Bottom Visualizer Accent -->
<div class="relative z-10 flex items-end gap-2 h-32 w-full max-w-sm mt-auto opacity-80">
<div class="bar w-4 rounded-t-sm"></div>
<div class="bar w-4 rounded-t-sm"></div>
<div class="bar w-4 rounded-t-sm"></div>
<div class="bar w-4 rounded-t-sm"></div>
<div class="bar w-4 rounded-t-sm"></div>
<div class="bar w-4 rounded-t-sm"></div>
<div class="bar w-4 rounded-t-sm"></div>
</div>
</div>
<!-- Right Form Area -->
<div class="w-full lg:w-1/2 flex items-center justify-center p-6 sm:p-12 xl:p-24 relative bg-background">
<!-- Mobile Logo (only visible on small screens) -->
<div class="absolute top-6 left-6 lg:hidden flex items-center gap-2">
<span class="material-symbols-outlined icon-fill text-primary text-2xl">graphic_eq</span>
<span class="text-headline-md font-headline-md font-black text-primary tracking-tighter">Sonic Stage</span>
</div>
<div class="w-full max-w-md space-y-10 mt-12 lg:mt-0">
<div class="space-y-2">
<h2 class="text-headline-lg font-headline-lg text-on-surface">Entrar no Palco</h2>
<p class="text-body-lg font-body-lg text-on-surface-variant">Registre sua conta para acessar o palco.</p>
</div>
<form class="space-y-6">
<!-- Name -->
<div class="space-y-1.5">
<label class="block text-label-lg font-label-lg text-on-surface" for="name">Nome de Artista / Exibição</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant">person</span>
</span>
<input class="w-full pl-12 pr-4 py-3 bg-surface-container-lowest border border-surface-variant rounded-lg text-body-md font-body-md text-on-surface placeholder-on-surface-variant focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary shadow-sm transition-all duration-300" id="name" placeholder="ex. Neon Pulse" type="text"/>
</div>
</div>
<!-- Email -->
<div class="space-y-1.5">
<label class="block text-label-lg font-label-lg text-on-surface" for="email">Endereço de E-mail</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant">mail</span>
</span>
<input class="w-full pl-12 pr-4 py-3 bg-surface-container-lowest border border-surface-variant rounded-lg text-body-md font-body-md text-on-surface placeholder-on-surface-variant focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary shadow-sm transition-all duration-300" id="email" placeholder="voce@exemplo.com" type="email"/>
</div>
</div>
<!-- Password -->
<div class="space-y-1.5">
<label class="block text-label-lg font-label-lg text-on-surface" for="password">Senha</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant">lock</span>
</span>
<input class="w-full pl-12 pr-4 py-3 bg-surface-container-lowest border border-surface-variant rounded-lg text-body-md font-body-md text-on-surface placeholder-on-surface-variant focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary shadow-sm transition-all duration-300" id="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Role / Instrument (Bento-style selection) -->
<div class="space-y-3 pt-2">
<label class="block text-label-lg font-label-lg text-on-surface">Função Principal</label>
<div class="grid grid-cols-2 sm:grid-cols-3 gap-3" id="role-selector">
<label class="cursor-pointer">
<input class="peer sr-only" name="role" type="radio" value="vocalist"/>
<div class="flex flex-col items-center justify-center p-3 rounded-lg border border-surface-variant bg-surface-container-low text-on-surface-variant peer-checked:border-secondary peer-checked:bg-secondary-container/10 peer-checked:text-secondary peer-checked:shadow-[0_0_10px_rgba(255,75,137,0.15)] transition-all duration-200">
<span class="material-symbols-outlined mb-1">mic</span>
<span class="text-label-sm font-label-sm">Vocalista</span>
</div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="role" type="radio" value="guitar"/>
<div class="flex flex-col items-center justify-center p-3 rounded-lg border border-surface-variant bg-surface-container-low text-on-surface-variant peer-checked:border-secondary peer-checked:bg-secondary-container/10 peer-checked:text-secondary peer-checked:shadow-[0_0_10px_rgba(255,75,137,0.15)] transition-all duration-200">
<span class="material-symbols-outlined mb-1">music_note</span>
<span class="text-label-sm font-label-sm">Cordas</span>
</div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="role" type="radio" value="drums"/>
<div class="flex flex-col items-center justify-center p-3 rounded-lg border border-surface-variant bg-surface-container-low text-on-surface-variant peer-checked:border-secondary peer-checked:bg-secondary-container/10 peer-checked:text-secondary peer-checked:shadow-[0_0_10px_rgba(255,75,137,0.15)] transition-all duration-200">
<span class="material-symbols-outlined mb-1">album</span>
<span class="text-label-sm font-label-sm">Percussão</span>
</div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="role" type="radio" value="keys"/>
<div class="flex flex-col items-center justify-center p-3 rounded-lg border border-surface-variant bg-surface-container-low text-on-surface-variant peer-checked:border-secondary peer-checked:bg-secondary-container/10 peer-checked:text-secondary peer-checked:shadow-[0_0_10px_rgba(255,75,137,0.15)] transition-all duration-200">
<span class="material-symbols-outlined mb-1">piano</span>
<span class="text-label-sm font-label-sm">Teclas</span>
</div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="role" type="radio" value="producer"/>
<div class="flex flex-col items-center justify-center p-3 rounded-lg border border-surface-variant bg-surface-container-low text-on-surface-variant peer-checked:border-secondary peer-checked:bg-secondary-container/10 peer-checked:text-secondary peer-checked:shadow-[0_0_10px_rgba(255,75,137,0.15)] transition-all duration-200">
<span class="material-symbols-outlined mb-1">tune</span>
<span class="text-label-sm font-label-sm">Produtor</span>
</div>
</label>
<label class="cursor-pointer">
<input checked="" class="peer sr-only" name="role" type="radio" value="fan"/>
<div class="flex flex-col items-center justify-center p-3 rounded-lg border border-surface-variant bg-surface-container-low text-on-surface-variant peer-checked:border-secondary peer-checked:bg-secondary-container/10 peer-checked:text-secondary peer-checked:shadow-[0_0_10px_rgba(255,75,137,0.15)] transition-all duration-200">
<span class="material-symbols-outlined mb-1">headphones</span>
<span class="text-label-sm font-label-sm">Ouvinte</span>
</div>
</label>
</div>
</div>
<!-- Submit Action -->
<div class="pt-6">
<button class="w-full flex items-center justify-center gap-2 bg-primary text-on-primary py-4 rounded-xl shadow-[0_0_20px_rgba(164,230,255,0.2)] hover:shadow-[0_0_30px_rgba(164,230,255,0.4)] hover:bg-primary-fixed-dim transition-all duration-300 transform active:scale-95" type="button">
<span class="text-label-lg font-label-lg font-bold">Criar Conta</span>
<span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</div>
</form>
<div class="text-center">
<p class="text-body-md font-body-md text-on-surface-variant">
                    Já faz parte da equipe? 
                    <a class="text-secondary hover:text-secondary-fixed transition-colors font-semibold" href="#">Entre aqui</a>
</p>
</div>
</div>
</div>
</body></html>
