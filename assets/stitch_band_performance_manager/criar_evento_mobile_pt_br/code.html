<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Criar Ensaio - Sonic Stage</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline": "#859399",
                        "tertiary": "#ffd59c",
                        "secondary-fixed": "#ffd9e0",
                        "tertiary-fixed": "#ffddb1",
                        "on-error-container": "#ffdad6",
                        "on-background": "#e5e2e1",
                        "background": "#131313",
                        "on-primary-fixed-variant": "#004e60",
                        "surface-container-highest": "#353534",
                        "on-tertiary-container": "#6b4700",
                        "on-secondary-container": "#590026",
                        "error": "#ffb4ab",
                        "on-secondary-fixed-variant": "#8f0041",
                        "on-tertiary-fixed": "#291800",
                        "surface-container-high": "#2a2a2a",
                        "tertiary-fixed-dim": "#ffba49",
                        "surface-tint": "#4cd6ff",
                        "surface-container-low": "#1c1b1b",
                        "primary-container": "#00d1ff",
                        "outline-variant": "#3c494e",
                        "on-tertiary-fixed-variant": "#624000",
                        "on-tertiary": "#442b00",
                        "secondary-container": "#ff4b89",
                        "on-error": "#690005",
                        "surface-variant": "#353534",
                        "error-container": "#93000a",
                        "primary-fixed-dim": "#4cd6ff",
                        "secondary-fixed-dim": "#ffb1c3",
                        "on-secondary-fixed": "#3f0019",
                        "surface-bright": "#3a3939",
                        "on-secondary": "#66002c",
                        "surface": "#131313",
                        "primary": "#a4e6ff",
                        "surface-dim": "#131313",
                        "surface-container-lowest": "#0e0e0e",
                        "primary-fixed": "#b7eaff",
                        "on-surface-variant": "#bbc9cf",
                        "on-primary": "#003543",
                        "on-surface": "#e5e2e1",
                        "inverse-surface": "#e5e2e1",
                        "inverse-on-surface": "#313030",
                        "surface-container": "#201f1f",
                        "on-primary-container": "#00566a",
                        "tertiary-container": "#feb127",
                        "inverse-primary": "#00677f",
                        "on-primary-fixed": "#001f28",
                        "secondary": "#ffb1c3"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "margin-desktop": "48px",
                        "gutter": "24px",
                        "max-width": "1440px",
                        "margin-mobile": "16px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Montserrat"],
                        "headline-md": ["Montserrat"],
                        "label-sm": ["Montserrat"],
                        "body-md": ["Montserrat"],
                        "headline-lg-mobile": ["Montserrat"],
                        "body-lg": ["Montserrat"],
                        "label-lg": ["Montserrat"],
                        "display-lg": ["Montserrat"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "label-sm": ["12px", { "lineHeight": "1.2", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],

                        "display-lg": ["56px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800" }]

                }
            }
        }

<style>
        body {
            background-color: #131313;
            color: #e5e2e1;
        }
        .glow-effect {
            box-shadow: 0 0 15px rgba(164, 230, 255, 0.2);
        }
        .glow-effect-magenta {
            box-shadow: 0 0 15px rgba(255, 177, 195, 0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col pt-16 pb-24 relative overflow-x-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-background dark:bg-background flex justify-between items-center px-margin-mobile h-16 shadow-none">
<div class="flex items-center gap-4">
<button class="text-primary dark:text-primary hover:opacity-80 transition-opacity active:scale-95 flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-extrabold text-primary dark:text-primary tracking-tighter">Sonic Stage</h1>
</div>
<div>
<button class="text-primary dark:text-primary hover:opacity-80 transition-opacity active:scale-95 flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">more_vert</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 px-margin-mobile flex flex-col gap-6 relative z-10">
<!-- Header Title -->
<div class="mt-4 mb-2">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-background">Novo Ensaio</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Configure os detalhes da próxima sessão.</p>
</div>
<!-- Form Section -->
<section class="bg-[#0A0A0A] rounded-xl p-4 flex flex-col gap-5 border border-surface-container-high relative overflow-hidden">
<!-- Decorative gradient accent -->
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary to-secondary"></div>
<div class="flex flex-col gap-2">
<label class="font-label-lg text-label-lg text-on-surface" for="event-title">Título do Ensaio</label>
<input class="bg-[#050505] border border-[#1A1A1A] text-on-background rounded-lg px-4 py-3 font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline-variant w-full" id="event-title" placeholder="Ex: Preparação para o Show de Sexta" type="text"/>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="flex flex-col gap-2">
<label class="font-label-lg text-label-lg text-on-surface" for="event-date">Data</label>
<div class="relative">
<input class="bg-[#050505] border border-[#1A1A1A] text-on-background rounded-lg pl-10 pr-4 py-3 font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all w-full [color-scheme:dark]" id="event-date" type="date"/>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none">calendar_today</span>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-lg text-label-lg text-on-surface" for="event-time">Hora</label>
<div class="relative">
<input class="bg-[#050505] border border-[#1A1A1A] text-on-background rounded-lg pl-10 pr-4 py-3 font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all w-full [color-scheme:dark]" id="event-time" type="time"/>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none">schedule</span>
</div>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-lg text-label-lg text-on-surface" for="event-location">Local</label>
<div class="relative">
<input class="bg-[#050505] border border-[#1A1A1A] text-on-background rounded-lg pl-10 pr-4 py-3 font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline-variant w-full" id="event-location" placeholder="Estúdio 3, Centro" type="text"/>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none">location_on</span>
</div>
</div>
</section>
<!-- Roteiro Section -->
<section class="flex flex-col gap-4 mt-2">
<div class="flex justify-between items-center">
<h3 class="font-headline-md text-headline-md text-on-background">Roteiro de Ensaio</h3>
<button class="text-secondary font-label-lg text-label-lg flex items-center gap-1 hover:opacity-80 active:scale-95 transition-all">
<span class="material-symbols-outlined text-[18px]">add</span> Adicionar
                </button>
</div>
<div class="flex flex-col gap-3">
<!-- Goal Item 1 -->
<div class="bg-[#0A0A0A] border border-[#1A1A1A] rounded-lg p-3 flex items-center gap-3 active:scale-[0.98] transition-transform">
<div class="w-8 h-8 rounded-full bg-surface-container-high flex flex-shrink-0 items-center justify-center text-primary">
<span class="font-label-lg text-label-lg">1</span>
</div>
<div class="flex-1">
<p class="font-body-md text-body-md text-on-background">Passagem de som geral</p>
<p class="font-label-sm text-label-sm text-outline">15 min</p>
</div>
<button class="text-outline-variant hover:text-error transition-colors">
<span class="material-symbols-outlined">delete</span>
</button>
</div>
<!-- Goal Item 2 -->
<div class="bg-[#0A0A0A] border border-[#1A1A1A] rounded-lg p-3 flex items-center gap-3 active:scale-[0.98] transition-transform">
<div class="w-8 h-8 rounded-full bg-surface-container-high flex flex-shrink-0 items-center justify-center text-primary">
<span class="font-label-lg text-label-lg">2</span>
</div>
<div class="flex-1">
<p class="font-body-md text-body-md text-on-background">Revisar arranjo de "Neon Nights"</p>
<p class="font-label-sm text-label-sm text-outline">30 min</p>
</div>
<button class="text-outline-variant hover:text-error transition-colors">
<span class="material-symbols-outlined">delete</span>
</button>
</div>
<!-- Goal Item 3 -->
<div class="bg-[#0A0A0A] border border-dashed border-[#1A1A1A] rounded-lg p-3 flex items-center gap-3 opacity-60">
<div class="flex-1">
<input class="bg-transparent border-none text-on-background w-full focus:outline-none focus:ring-0 font-body-md text-body-md p-0 placeholder:text-outline-variant" placeholder="Adicionar novo objetivo..." type="text"/>
</div>
</div>
</div>
</section>
</main>
<!-- Bottom Action Area (Fixed) -->
<div class="fixed bottom-0 left-0 w-full bg-surface-container-lowest/90 backdrop-blur-md p-4 border-t border-surface-container-high z-40 pb-6">
<button class="w-full bg-primary text-background font-label-lg text-label-lg py-4 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-primary-fixed transition-colors active:scale-95 glow-effect">
            Confirmar Ensaio
        </button>
</div>
</body></html>
