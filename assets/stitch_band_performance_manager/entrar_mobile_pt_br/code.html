<style>

<body class="bg-background text-on-surface font-body-md min-h-screen flex flex-col items-center justify-center ambient-bg p-margin-mobile">
<!-- Suppressed Shell components (TopAppBar, BottomNavBar) because this is a Login (Transactional) screen. -->
<main class="w-full max-w-sm mx-auto flex flex-col items-center z-10 relative">
<!-- Subtle background decorative elements -->
<div class="absolute -top-32 -left-32 w-64 h-64 bg-primary-container rounded-full mix-blend-screen filter blur-[100px] opacity-20 pointer-events-none"></div>
<div class="absolute -bottom-32 -right-32 w-64 h-64 bg-secondary-container rounded-full mix-blend-screen filter blur-[100px] opacity-10 pointer-events-none"></div>
<!-- Logo / Header -->
<div class="text-center mb-12">
<h1 class="font-display-lg text-display-lg text-primary tracking-tighter mb-2">Sonic Stage</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Acesso aos bastidores.</p>
</div>
<!-- Login Form Card -->
<div class="w-full bg-[#0A0A0A] rounded-xl p-8 shadow-2xl border border-surface-container-high relative overflow-hidden">
<!-- Card subtle highlight -->
<div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-primary-container/30 to-transparent"></div>
<form action="#" class="space-y-6" method="POST">
<!-- Email Field -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-2" for="email">Email</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant text-[20px]" style="font-variation-settings: 'FILL' 0;">mail</span>
</span>
<input class="block w-full pl-10 pr-3 py-3 bg-[#050505] border border-[#1A1A1A] rounded-lg text-on-surface font-body-md text-body-md focus:outline-none input-glow transition-all duration-300 placeholder-outline-variant" id="email" name="email" placeholder="seu@email.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<div class="flex items-center justify-between mb-2">
<label class="block font-label-sm text-label-sm text-on-surface-variant" for="password">Senha</label>
<a class="font-label-sm text-label-sm text-primary hover:text-primary-fixed transition-colors" href="#">Esqueceu?</a>
</div>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant text-[20px]" style="font-variation-settings: 'FILL' 0;">lock</span>
</span>
<input class="block w-full pl-10 pr-3 py-3 bg-[#050505] border border-[#1A1A1A] rounded-lg text-on-surface font-body-md text-body-md focus:outline-none input-glow transition-all duration-300 placeholder-outline-variant" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Submit Button -->
<button class="w-full flex justify-center items-center py-4 px-4 border border-transparent rounded-lg shadow-sm font-label-lg text-label-lg text-black bg-primary glow-effect hover:bg-primary-fixed focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary focus:ring-offset-background transition-all duration-300 active:scale-95" type="submit">
                    Entrar no Palco
                    <span class="material-symbols-outlined ml-2 text-[20px]" style="font-variation-settings: 'FILL' 1;">arrow_forward</span>
</button>
</form>
</div>
<!-- Create Account Link -->
<div class="mt-8 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                Novo por aqui? 
                <a class="font-label-lg text-label-lg text-secondary hover:text-secondary-fixed transition-colors ml-1" href="#">Criar Conta</a>
</p>
</div>
</main>
<script>
        // Simple ambient subtle movement effect for the background blobs
        document.addEventListener('DOMContentLoaded', () => {
            const blobs = document.querySelectorAll('.mix-blend-screen');
            let time = 0;
            
            function animate() {
                time += 0.01;
                blobs[0].style.transform = `translate(${Math.sin(time) * 10}px, ${Math.cos(time) * 10}px)`;
                blobs[1].style.transform = `translate(${Math.cos(time) * 15}px, ${Math.sin(time) * 15}px)`;
                requestAnimationFrame(animate);
            }
            
            animate();
        });
    </script>
