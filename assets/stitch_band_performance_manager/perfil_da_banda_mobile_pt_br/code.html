<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>

<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
        }
        
        .neon-glow {
            box-shadow: 0 0 15px rgba(255, 75, 137, 0.3);
        }
        
        .neon-glow-focus:focus-within {
            box-shadow: 0 0 15px rgba(0, 209, 255, 0.2);
            border-color: theme('colors.primary-container');
        }

        /* Hide scrollbar for cleaner look */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="antialiased min-h-screen flex flex-col pt-16">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-background dark:bg-background flex justify-between items-center px-margin-mobile h-16 w-full">
<div class="flex items-center gap-4">
<button aria-label="Voltar" class="text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95 transition-transform">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-extrabold text-primary dark:text-primary tracking-tighter">Sonic Stage</h1>
</div>
<div class="w-8 h-8 rounded-full overflow-hidden bg-surface-container-high border border-outline-variant flex items-center justify-center">
<span class="material-symbols-outlined text-outline">person</span>
</div>
</header>
<!-- Main Canvas (Task-focused screen, nav shell hidden per guidelines) -->
<main class="flex-1 flex flex-col px-margin-mobile py-8 gap-8 max-w-[600px] mx-auto w-full">
<div class="flex flex-col gap-2">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-background">Registro de Banda</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Configure o perfil da sua banda para começar a agendar shows e conectar-se com fãs.</p>
</div>
<form class="flex flex-col gap-6" onsubmit="event.preventDefault();">
<!-- Logo Upload Component -->
<div class="flex flex-col gap-3">
<label class="font-label-lg text-label-lg text-on-background">Foto de Perfil / Logo</label>
<div class="relative w-full h-48 rounded-xl bg-[#0A0A0A] border border-dashed border-outline-variant flex flex-col items-center justify-center gap-3 cursor-pointer hover:bg-surface-container-high transition-colors overflow-hidden group">
<span class="material-symbols-outlined text-[48px] text-primary group-hover:scale-110 transition-transform">add_photo_alternate</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">Toque para fazer upload</span>
<input accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" type="file"/>
</div>
</div>
<!-- Band Name Input -->
<div class="flex flex-col gap-2">
<label class="font-label-lg text-label-lg text-on-background" for="band_name">Nome da Banda</label>
<div class="bg-[#050505] border border-[#1A1A1A] rounded-lg p-1 transition-all duration-300 neon-glow-focus">
<input class="w-full bg-transparent border-none text-on-background font-body-md text-body-md focus:ring-0 placeholder:text-outline p-3 rounded-DEFAULT" id="band_name" placeholder="Ex: The Neon Shadows" required="" type="text"/>
</div>
</div>
<!-- Genre Dropdown -->
<div class="flex flex-col gap-2">
<label class="font-label-lg text-label-lg text-on-background" for="genre">Gênero Principal</label>
<div class="bg-[#050505] border border-[#1A1A1A] rounded-lg p-1 transition-all duration-300 neon-glow-focus relative">
<select class="w-full bg-transparent border-none text-on-background font-body-md text-body-md focus:ring-0 appearance-none p-3 rounded-DEFAULT cursor-pointer" id="genre">
<option class="bg-surface-container-high text-on-surface-variant" disabled="" selected="" value="">Selecione o gênero principal</option>
<option class="bg-surface-container-high text-on-background" value="rock">Rock</option>
<option class="bg-surface-container-high text-on-background" value="eletronica">Eletrônica</option>
<option class="bg-surface-container-high text-on-background" value="indie">Indie</option>
<option class="bg-surface-container-high text-on-background" value="metal">Metal</option>
<option class="bg-surface-container-high text-on-background" value="hiphop">Hip Hop</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline pointer-events-none">expand_more</span>
</div>
</div>
<!-- Short Bio Textarea -->
<div class="flex flex-col gap-2">
<label class="font-label-lg text-label-lg text-on-background" for="bio">Biografia Curta</label>
<div class="bg-[#050505] border border-[#1A1A1A] rounded-lg p-1 transition-all duration-300 neon-glow-focus">
<textarea class="w-full bg-transparent border-none text-on-background font-body-md text-body-md focus:ring-0 placeholder:text-outline p-3 rounded-DEFAULT resize-none" id="bio" placeholder="Descreva o som e a vibe da sua banda em poucas palavras..." rows="4"></textarea>
</div>
<div class="flex justify-end">
<span class="font-label-sm text-label-sm text-outline-variant">0/150</span>
</div>
</div>
<!-- Submit Button (Neon Magenta) -->
<div class="mt-4 pt-4 border-t border-[#1A1A1A]">
<button class="w-full bg-secondary-container text-on-secondary-container font-label-lg text-label-lg py-4 rounded-xl flex items-center justify-center gap-2 neon-glow hover:opacity-90 active:scale-95 transition-all duration-200" type="submit">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">rocket_launch</span>
                    Registrar Banda
                </button>
</div>
</form>
</main>
</body></html>
