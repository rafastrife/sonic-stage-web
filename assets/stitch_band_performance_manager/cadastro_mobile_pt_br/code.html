<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sonic Stage - Cadastro</title>

                        "background": "#131313",

                        "surface-container-highest": "#353534",
                        "on-tertiary-container": "#6b4700",
                        "on-secondary-container": "#590026",
                        "error": "#ffb4ab",
                        "on-secondary-fixed-variant": "#8f0041",
                        "on-tertiary-fixed": "#291800",
                        "surface-container-high": "#2a2a2a",
                        "tertiary-fixed-dim": "#ffba49",
                        "surface-tint": "#4cd6ff",
                        "surface-container-low": "#1c1b1b",
                        "primary-container": "#00d1ff",
                        "outline-variant": "#3c494e",
                        "on-tertiary-fixed-variant": "#624000",

                        "on-secondary-fixed": "#3f0019",
                        "surface-bright": "#3a3939",
                        "on-secondary": "#66002c",
                        "surface": "#131313",
                        "primary": "#a4e6ff",
                        "surface-dim": "#131313",
                        "surface-container-lowest": "#0e0e0e",
                        "primary-fixed": "#b7eaff",
                        "on-surface-variant": "#bbc9cf",
                        "on-primary": "#003543",
                        "on-surface": "#e5e2e1",
                        "inverse-surface": "#e5e2e1",
                        "inverse-on-surface": "#313030",
                        "surface-container": "#201f1f",
                        "on-primary-container": "#00566a",
                        "tertiary-container": "#feb127",
                        "inverse-primary": "#00677f",
                        "on-primary-fixed": "#001f28",
                        "secondary": "#ffb1c3"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",

                    },
                    "spacing": {
                        "margin-desktop": "48px",
                        "gutter": "24px",
                        "max-width": "1440px",

                    },
                    "fontFamily": {

<style>
        /* Custom Glowing Effects and Scrollbar */
        .glow-primary {
            box-shadow: 0 0 15px rgba(164, 230, 255, 0.3);
        }
        .glow-secondary {
            box-shadow: 0 0 15px rgba(255, 177, 195, 0.2);
        }
        .focus-ring:focus-within {
            border-color: #a4e6ff;
            box-shadow: 0 0 15px rgba(164, 230, 255, 0.2);
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #131313;
        }
        ::-webkit-scrollbar-thumb {
            background: #353534;
            border-radius: 4px;
        }
        .chip-active {
            background-color: rgba(255, 75, 137, 0.2); /* secondary-container with opacity */
            color: #ffb1c3; /* secondary */
            border-color: #ffb1c3;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col md:hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- Transactional Screen: Navigation Shell Suppressed as per logic -->
<main class="flex-grow flex flex-col pt-12 px-margin-mobile pb-8 relative overflow-hidden">
<!-- Ambient Background Decoration -->
<div class="absolute top-[-10%] left-[-20%] w-[150%] h-[50%] bg-gradient-to-b from-primary/10 to-transparent blur-[100px] pointer-events-none -z-10"></div>
<div class="absolute bottom-[-10%] right-[-20%] w-[100%] h-[50%] bg-gradient-to-t from-secondary/5 to-transparent blur-[120px] pointer-events-none -z-10"></div>
<!-- Header -->
<header class="mb-10 text-center relative z-10">
<h1 class="font-display-lg text-display-lg text-primary tracking-tighter mb-2">Sonic Stage</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Junte-se à cena.</p>
</header>
<!-- Form Container -->
<div class="bg-[#0A0A0A] rounded-xl p-6 shadow-2xl border border-surface-container-high relative z-10 flex-grow flex flex-col">
<form action="#" class="flex flex-col gap-6 flex-grow" method="POST">
<!-- Nome -->
<div class="flex flex-col gap-2">
<label class="font-label-lg text-label-lg text-on-surface" for="name">Nome de Artista/Usuário</label>
<div class="relative focus-ring rounded border border-[#1A1A1A] bg-[#050505] transition-all duration-300">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant">person</span>
<input class="w-full bg-transparent border-none text-on-surface font-body-md py-3 pl-10 pr-4 focus:ring-0 placeholder:text-outline-variant rounded" id="name" name="name" placeholder="Como te chamam no palco?" required="" type="text"/>
</div>
</div>
<!-- Email -->
<div class="flex flex-col gap-2">
<label class="font-label-lg text-label-lg text-on-surface" for="email">E-mail</label>
<div class="relative focus-ring rounded border border-[#1A1A1A] bg-[#050505] transition-all duration-300">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant">mail</span>
<input class="w-full bg-transparent border-none text-on-surface font-body-md py-3 pl-10 pr-4 focus:ring-0 placeholder:text-outline-variant rounded" id="email" name="email" placeholder="seu@email.com" required="" type="email"/>
</div>
</div>
<!-- Password -->
<div class="flex flex-col gap-2">
<label class="font-label-lg text-label-lg text-on-surface" for="password">Senha</label>
<div class="relative focus-ring rounded border border-[#1A1A1A] bg-[#050505] transition-all duration-300">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant">lock</span>
<input class="w-full bg-transparent border-none text-on-surface font-body-md py-3 pl-10 pr-12 focus:ring-0 placeholder:text-outline-variant rounded" id="password" name="password" placeholder="Mínimo de 8 caracteres" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline-variant hover:text-primary transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[20px]" id="visibility-icon">visibility</span>
</button>
</div>
</div>
<!-- Primary Role (Chips) -->
<div class="flex flex-col gap-3 mt-2">
<label class="font-label-lg text-label-lg text-on-surface">Seu Instrumento Principal</label>
<div class="flex flex-wrap gap-2" id="role-chips">
<button class="role-chip px-4 py-2 rounded-[4px] border border-surface-container-high bg-[#1A1A1A] text-on-surface font-label-sm text-label-sm transition-all duration-200 hover:border-outline" type="button">Vocal</button>
<button class="role-chip px-4 py-2 rounded-[4px] border border-surface-container-high bg-[#1A1A1A] text-on-surface font-label-sm text-label-sm transition-all duration-200 hover:border-outline" type="button">Cordas</button>
<button class="role-chip px-4 py-2 rounded-[4px] border border-surface-container-high bg-[#1A1A1A] text-on-surface font-label-sm text-label-sm transition-all duration-200 hover:border-outline" type="button">Bateria</button>
<button class="role-chip px-4 py-2 rounded-[4px] border border-surface-container-high bg-[#1A1A1A] text-on-surface font-label-sm text-label-sm transition-all duration-200 hover:border-outline" type="button">Teclas</button>
<button class="role-chip px-4 py-2 rounded-[4px] border border-surface-container-high bg-[#1A1A1A] text-on-surface font-label-sm text-label-sm transition-all duration-200 hover:border-outline" type="button">DJ/Produtor</button>
<button class="role-chip px-4 py-2 rounded-[4px] border border-surface-container-high bg-[#1A1A1A] text-on-surface font-label-sm text-label-sm transition-all duration-200 hover:border-outline" type="button">Fã</button>
</div>
<input id="primary_role_input" name="primary_role" required="" type="hidden"/>
</div>
<!-- Submit Button -->
<div class="mt-auto pt-6">
<button class="w-full bg-primary text-[#000000] font-label-lg text-label-lg py-4 rounded hover:opacity-90 transition-opacity active:scale-95 duration-200 glow-primary flex justify-center items-center gap-2" type="submit">
<span>Criar Conta</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</div>
</form>
<div class="mt-6 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Já tem uma conta? <a class="text-secondary font-label-lg text-label-lg hover:underline underline-offset-4" href="#">Entrar</a>
</p>
</div>
</div>
</main>
<script>
        // Password Visibility Toggle
        function togglePassword() {
            const pwdInput = document.getElementById('password');
            const icon = document.getElementById('visibility-icon');
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                pwdInput.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        // Chip Selection Logic
        const chips = document.querySelectorAll('.role-chip');
        const roleInput = document.getElementById('primary_role_input');

        chips.forEach(chip => {
            chip.addEventListener('click', () => {
                // Remove active class from all
                chips.forEach(c => {
                    c.classList.remove('chip-active');
                    c.classList.add('bg-[#1A1A1A]', 'border-surface-container-high', 'text-on-surface');
                });
                
                // Add active class to clicked
                chip.classList.remove('bg-[#1A1A1A]', 'border-surface-container-high', 'text-on-surface');
                chip.classList.add('chip-active');
                
                // Update hidden input
                roleInput.value = chip.textContent;
            });
        });
    </script>
</body></html>
